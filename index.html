<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NCTO Dashboard</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: grid;
      place-items: center;
      text-align: center;
    }
    .box {
      padding: 24px;
      max-width: 420px;
    }
    h1 {
      margin-bottom: 12px;
      font-size: 24px;
    }
    p {
      opacity: 0.9;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>NCTO Dashboard</h1>
    <p>Loading dashboard…</p>
  </div>
</body>
</html>
